services:
  - type: web
    name: financeiro-danado
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: /opt/render/project/src/data/data.json

